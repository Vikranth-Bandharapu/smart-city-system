<!DOCTYPE html>
<html>
<head>
<title>Login - Smart City Portal</title>
<link rel="stylesheet" href="login.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* FULL PAGE */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4b1a1a,#1a5276);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CONTAINER */
.login-container{
    display:flex;
    width:800px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* LEFT */
.left{
    background:#1a5276;
    color:white;
    padding:40px;
    width:50%;
}

.left h1{
    margin-bottom:10px;
}

.left ul{
    margin-top:20px;
    padding-left:20px;
}

/* RIGHT */
.right{
    padding:40px;
    width:50%;
}

.right h2{
    margin-bottom:20px;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#1a5276;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#154360;
}

/* EXTRA TEXT */
.extra{
    margin-top:10px;
    font-size:14px;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    color:#1a5276;
    padding:8px 15px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
    .login-container{
        flex-direction:column;
        width:90%;
    }

    .left, .right{
        width:100%;
    }
}

</style>

</head>

<body>

<!-- 🔙 BACK BUTTON -->
<a href="index.html" class="back-btn">⬅ Back</a>

<div class="login-container">

<div class="left">
<h1>Welcome Back</h1>
<p>Access the Smart City Portal to explore innovations, reports, events and urban development projects.</p>

<ul>
<li>✔ Smart Infrastructure Updates</li>
<li>✔ City Innovation Reports</li>
<li>✔ Upcoming Events</li>
</ul>
</div>

<div class="right">
<h2>Login</h2>

<form>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

<p class="extra">Don't have an account? Register</p>
</form>

</div>

</div>

</body>
</html>
